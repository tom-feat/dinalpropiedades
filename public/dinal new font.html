  <title>Dinal — Font Options</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    body {
      background: #0A162D;
      margin: 0;
      padding: 60px;
      display: flex;
      flex-direction: column;
      gap: 60px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    .row svg { height: 198px; width: auto; }

    .label {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: #A3FF86;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .dinal {
      color: white;
      font-size: 128px;
      line-height: 1;
    }

    .f1  { font-family: 'Bebas Neue', sans-serif; }
    .f2  { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; }
    .f3  { font-family: 'Oswald', sans-serif; font-weight: 700; }
    .f4  { font-family: 'Saira Condensed', sans-serif; font-weight: 800; }
    .f5  { font-family: 'Teko', sans-serif; font-weight: 600; }
    .f6  { font-family: 'Fjalla One', sans-serif; }
    .f7  { font-family: 'Saira Extra Condensed', sans-serif; font-weight: 800; }
    .f8  { font-family: 'Exo 2', sans-serif; font-weight: 900; }
    .f9  { font-family: 'Michroma', sans-serif; }
    .f10 { font-family: 'Russo One', sans-serif; }
  </style>
</head>
