<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dinal — Font Exploration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@800&family=Oswald:wght@700&family=Saira+Condensed:wght@800&family=Teko:wght@600&family=Fjalla+One&family=Saira+Extra+Condensed:wght@800&family=Exo+2:wght@900&family=Michroma&family=Russo+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy:   #0A162D;
      --accent: #A3FF86;
      --white:  #FFFFFF;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--navy);
      color: var(--white);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────────────── */
    .header {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 52px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .header-title {
      font-family: Arial, sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .header-counter {
      font-family: Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--accent);
    }

    /* ── Slideshow ───────────────────────────────────── */
    .slideshow {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: 1;
    }

    .slide.active {
      opacity: 1;
      pointer-events: all;
      z-index: 2;
    }

    /* ── Logo combo ──────────────────────────────────── */
    .logo-combo {
      display: flex;
      align-items: center;
      gap: 52px;
    }

    .favicon-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .favicon-icon svg {
      height: 130px;
      width: auto;
      display: block;
    }

    .combo-divider {
      width: 1px;
      height: 108px;
      background: rgba(255,255,255,0.12);
      flex-shrink: 0;
    }

    .text-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .dinal-word {
      font-size: 140px;
      line-height: 0.82;
      color: var(--white);
      letter-spacing: 0.03em;
    }

    .propiedades-word {
      font-size: 14px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5em;
      text-transform: uppercase;
    }

    /* ── Font info label ─────────────────────────────── */
    .font-info {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .font-tag {
      font-family: Arial, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .font-note {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.3px;
    }

    /* ── Bottom nav ──────────────────────────────────── */
    .nav {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 18px 52px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .nav-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      background: transparent;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      flex-shrink: 0;
      user-select: none;
    }

    .nav-btn:hover {
      border-color: var(--accent);
      background: rgba(163,255,134,0.07);
      color: var(--accent);
    }

    .dots {
      display: flex;
      gap: 9px;
      align-items: center;
    }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      cursor: pointer;
      transition: background 0.25s, transform 0.25s;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.6);
    }

    /* ── Keyboard hint ───────────────────────────────── */
    .kbd-hint {
      position: fixed;
      bottom: 26px;
      right: 52px;
      font-family: Arial, sans-serif;
      font-size: 9px;
      color: rgba(255,255,255,0.13);
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ── Font classes ────────────────────────────────── */
    .f-bebas    { font-family: 'Bebas Neue', sans-serif; }
    .f-barlow   { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; }
    .f-oswald   { font-family: 'Oswald', sans-serif; font-weight: 700; }
    .f-saira    { font-family: 'Saira Condensed', sans-serif; font-weight: 800; }
    .f-teko     { font-family: 'Teko', sans-serif; font-weight: 600; }
    .f-fjalla   { font-family: 'Fjalla One', sans-serif; }
    .f-saira-xc { font-family: 'Saira Extra Condensed', sans-serif; font-weight: 800; }
    .f-exo      { font-family: 'Exo 2', sans-serif; font-weight: 900; }
    .f-michroma { font-family: 'Michroma', sans-serif; }
    .f-russo    { font-family: 'Russo One', sans-serif; }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-title">Dinal Propiedades — Font Exploration</span>
    <span class="header-counter" id="counter">01 / 10</span>
  </div>

  <div class="slideshow" id="slideshow"></div>

  <div class="nav">
    <button class="nav-btn" id="prev" title="Previous (←)">&#8592;</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn" id="next" title="Next (→)">&#8594;</button>
  </div>

  <span class="kbd-hint">← → to navigate</span>

  <script>
    const FAVICON_SVG = `<svg width="565" height="565" viewBox="0 0 565 565" fill="none" xmlns="http://www.w3.org/2000/svg">

</mask>
<g mask="url(#m6)">

<g mask="url(#m7)">

<g mask="url(#m8)">

</mask>
<g mask="url(#m11)">
<mask id="m12" style="mask-type:luminance" maskUnits="userSpaceOnUse" x="249" y="186" width="142" height="192">

</mask>
<g mask="url(#m13)">
<mask id="m14" style="mask-type:luminance" maskUnits="userSpaceOnUse" x="251" y="190" width="140" height="185">
<path d="M390.686 212.175V353.703C390.686 365.304 381.294 374.709 369.709 374.709H251.074L350.957 201.506C354.777 194.915 361.785 190.837 369.409 190.837C381.184 190.837 390.717 200.4 390.717 212.175" fill="white"/>
</mask>
<g mask="url(#m14)">
<path d="M2797.04 -142.244H-515.252V714.289H2797.04V-142.244Z" fill="white"/>
</g></g></g></g></g>
</svg>`;

    const fonts = [
      {
        cls: 'f-bebas',
        name: 'Bebas Neue',
        note: 'Bold condensed display — closest to the current logo style'
      },
      {
        cls: 'f-barlow',
        name: 'Barlow Condensed ExtraBold',
        note: 'Geometric condensed, clean and modern — slight softness vs. Bebas'
      },
      {
        cls: 'f-oswald',
        name: 'Oswald Bold',
        note: 'Classic condensed sans-serif — versatile and professional'
      },
      {
        cls: 'f-saira',
        name: 'Saira Condensed ExtraBold',
        note: 'Technical / industrial personality — condensed with sharp edges'
      },
      {
        cls: 'f-teko',
        name: 'Teko SemiBold',
        note: 'Condensed display with unique letterform cuts — open tracking'
      },
      {
        cls: 'f-fjalla',
        name: 'Fjalla One',
        note: 'High-contrast condensed — strong editorial and signage presence'
      },
      {
        cls: 'f-saira-xc',
        name: 'Saira Extra Condensed Black',
        note: 'Ultra-tight condensed — maximum compression, bold statement'
      },
      {
        cls: 'f-exo',
        name: 'Exo 2 Black',
        note: 'Geometric with tech personality — angled terminals, futuristic'
      },
      {
        cls: 'f-michroma',
        name: 'Michroma',
        note: 'Geometric monoline — industrial and architectural, unique cut-ins'
      },
      {
        cls: 'f-russo',
        name: 'Russo One',
        note: 'Bold industrial display — solid, direct, no-nonsense weight'
      },
    ];

    const slideshowEl = document.getElementById('slideshow');
    const dotsEl      = document.getElementById('dots');
    const counterEl   = document.getElementById('counter');
    let current  = 0;
    let animating = false;

    // Build slides
    fonts.forEach((font, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide' + (i === 0 ? ' active' : '');
      slide.innerHTML = `
        <div class="logo-combo">
          <div class="favicon-icon">${FAVICON_SVG}</div>
          <div class="combo-divider"></div>
          <div class="text-stack">
            <div class="dinal-word ${font.cls}">DINAL</div>
          </div>
        </div>
        <div class="font-info">
          <div class="font-tag">${font.name}</div>
          <div class="font-note">${font.note}</div>
        </div>
      `;
      slideshowEl.appendChild(slide);
    });

    // Build dots
    const dotEls = fonts.map((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(dot);
      return dot;
    });

    const slides = document.querySelectorAll('.slide');

    function goTo(idx) {
      if (animating) return;
      const next = ((idx % fonts.length) + fonts.length) % fonts.length;
      if (next === current) return;
      animating = true;

      // Crossfade: bring new on top, fade old out simultaneously
      slides[next].classList.add('active');
      dotEls[next].classList.add('active');

      requestAnimationFrame(() => {
        slides[current].classList.remove('active');
        dotEls[current].classList.remove('active');
        counterEl.textContent = String(next + 1).padStart(2, '0') + ' / ' + fonts.length;
        current = next;
        setTimeout(() => { animating = false; }, 520);
      });
    }

    document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
    document.getElementById('next').addEventListener('click', () => goTo(current + 1));
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
    });
  </script>
</body>
</html>
